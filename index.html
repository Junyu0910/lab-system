<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实验室管理系统</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#EDE8E0;font-family:'DM Sans',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#D9CFBF;border-radius:3px}
.shell{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.app{width:100%;max-width:1180px;background:#FDFAF6;border-radius:28px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.14);display:flex;min-height:700px}
.sidebar{width:72px;background:#F5F0E8;display:flex;flex-direction:column;align-items:center;padding:24px 0;gap:8px;border-right:1px solid #E8E0D4;flex-shrink:0}
.logo{width:40px;height:40px;background:#1A1410;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:20px}
.nav-btn{width:44px;height:44px;border-radius:12px;border:none;cursor:pointer;background:transparent;color:#8C7B6B;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:20px}
.nav-btn.active{background:#1A1410}
.nav-btn:hover:not(.active){background:#E8E0D4}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:20px 32px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #EDE8E0;flex-shrink:0}
.topbar-title{font-family:'DM Serif Display',serif;font-size:15px;color:#1A1410}
.topbar-sub{font-size:12px;color:#8C7B6B;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-date{background:#F0EBE2;border-radius:12px;padding:8px 16px;font-size:13px;color:#8C7B6B}
.avatar-top{width:36px;height:36px;border-radius:50%;background:#E8C547;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:16px;color:#1A1410;font-weight:700}
.content{flex:1;overflow-y:auto;padding:32px}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.section-title{font-family:'DM Serif Display',serif;font-size:26px;color:#1A1410}
.section-sub{font-size:14px;color:#8C7B6B;margin-top:4px}
.btn{border:none;cursor:pointer;border-radius:12px;font-family:'DM Sans',sans-serif;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .15s;font-size:14px;padding:10px 20px}
.btn-primary{background:#1A1410;color:#F5F0E8}
.btn-primary:hover{background:#2E2318}
.btn-outline{background:transparent;color:#5C4D3C;border:1.5px solid #D9CFBF;padding:9px 19px}
.btn-outline:hover{background:#F0EBE2}
.btn-danger{background:#FFE9E9;color:#C0392B;border:1.5px solid #FBBCBC;padding:9px 19px}
.btn-sm{padding:7px 14px;font-size:13px}
.card{background:#fff;border-radius:18px;box-shadow:0 2px 12px rgba(0,0,0,.06);transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.1)}
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.member-card{padding:22px;cursor:pointer}
.avatar-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:18px;color:#fff;font-weight:700;flex-shrink:0}
.tag{background:#F0EBE2;border-radius:8px;padding:3px 10px;font-size:11px;color:#5C4D3C;font-weight:500}
input[type=text],input[type=date],input[type=number],textarea,select{
  width:100%;background:#F0EBE2;border:1.5px solid transparent;border-radius:10px;
  padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:#1A1410;
  outline:none;transition:border-color .15s;resize:vertical}
input:focus,textarea:focus,select:focus{border-color:#C0BBAF}
.form-group{margin-bottom:16px}
.input-label{font-size:12px;font-weight:600;color:#8C7B6B;margin-bottom:6px;letter-spacing:.05em}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-box{background:#FDFAF6;border-radius:20px;padding:32px;min-width:460px;max-width:560px;width:90%;box-shadow:0 24px 64px rgba(0,0,0,.18);transform:translateY(16px);transition:transform .2s;max-height:85vh;overflow-y:auto}
.modal-overlay.open .modal-box{transform:translateY(0)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.modal-title{font-family:'DM Serif Display',serif;font-size:20px;color:#1A1410}
.modal-close{border:none;background:none;cursor:pointer;color:#8C7B6B;font-size:22px;line-height:1;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#F0EBE2}
.meeting-list{display:flex;flex-direction:column;gap:14px}
.meeting-card{padding:24px}
.todo-item{background:#fff;border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.04);margin-bottom:8px;transition:all .15s}
.todo-check{width:22px;height:22px;border-radius:6px;border:2px solid #D9CFBF;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:transparent}
.todo-done .todo-check{background:#6BCB77;border-color:#6BCB77}
.todo-done{background:#F5F0E8;opacity:.65}
.mice-table{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.mice-header{display:grid;grid-template-columns:1fr 1.2fr 1fr 90px 1.5fr 52px;padding:12px 20px;background:#F0EBE2;font-size:11px;font-weight:700;color:#8C7B6B;letter-spacing:.06em}
.mice-row{display:grid;grid-template-columns:1fr 1.2fr 1fr 90px 1.5fr 52px;padding:16px 20px;border-top:1px solid #F0EBE2;align-items:center;transition:background .1s}
.mice-row:hover{background:#FDFAF6}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.summary-card{background:#fff;border-radius:16px;padding:18px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.del-btn{background:#FFF0F0;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#C0392B;font-size:15px;flex-shrink:0;transition:background .15s}
.del-btn:hover{background:#FFD5D5}
.check-item{display:flex;align-items:center;gap:12px;border-radius:12px;padding:12px 16px;cursor:pointer;transition:background .15s;margin-bottom:8px;background:#F5F0E8}
.check-item.done-check{background:#F0FBF0}
.check-box{width:22px;height:22px;border-radius:6px;background:#D9CFBF;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;font-size:13px}
.check-item.done-check .check-box{background:#6BCB77}
.info-row{display:flex;align-items:center;gap:12px;background:#F5F0E8;border-radius:12px;padding:12px 16px;margin-bottom:8px}
.hidden{display:none!important}
.flex{display:flex}.gap-10{gap:10px}.items-center{align-items:center}
.toast{position:fixed;bottom:32px;right:32px;background:#1A1410;color:#F5F0E8;border-radius:12px;padding:12px 20px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.loading{opacity:.5;pointer-events:none}
.prio-filter{display:flex;gap:4px}
.prio-btn{border:2px solid transparent;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .15s}
</style>
</head>
<body>
<div class="shell">
<div class="app">
  <div class="sidebar">
    <div class="logo">🧪</div>
    <button class="nav-btn active" onclick="switchTab('people')" id="nav-people" title="人员管理">👥</button>
    <button class="nav-btn" onclick="switchTab('meeting')" id="nav-meeting" title="会议记录">📋</button>
    <button class="nav-btn" onclick="switchTab('todo')" id="nav-todo" title="To-Do">✅</button>
    <button class="nav-btn" onclick="switchTab('mice')" id="nav-mice" title="小鼠管理">🐭</button>
    <div style="flex:1"></div>
    <button class="nav-btn" title="当前版本">🔔</button>
  </div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">实验室管理平台</div>
        <div class="topbar-sub">化学化工学院 · XX课题组</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="today-date"></div>
        <div class="avatar-top">张</div>
      </div>
    </div>
    <div class="content">

      <!-- 人员管理 -->
      <div id="tab-people">
        <div class="section-head">
          <div><div class="section-title">人员管理</div><div class="section-sub" id="member-sub">加载中...</div></div>
          <div class="flex gap-10">
            <button class="btn btn-outline btn-sm" onclick="openModal('onboard-modal')">☑️ 入职清单</button>
            <button class="btn btn-primary btn-sm" onclick="openModal('add-member-modal')">＋ 添加成员</button>
          </div>
        </div>
        <div class="member-grid" id="member-grid"></div>
      </div>

      <!-- 会议记录 -->
      <div id="tab-meeting" class="hidden">
        <div class="section-head">
          <div><div class="section-title">会议记录</div><div class="section-sub" id="meeting-sub">加载中...</div></div>
          <button class="btn btn-primary btn-sm" onclick="openModal('add-meeting-modal')">＋ 新增记录</button>
        </div>
        <div class="meeting-list" id="meeting-list"></div>
      </div>

      <!-- To-Do -->
      <div id="tab-todo" class="hidden">
        <div class="section-head">
          <div><div class="section-title">To-Do</div><div class="section-sub" id="todo-sub">加载中...</div></div>
          <div class="prio-filter">
            <button class="prio-btn" id="pf-high" style="background:#FF7E5F33;color:#C0392B" onclick="setNewPrio('high')">🔴 紧急</button>
            <button class="prio-btn" id="pf-medium" style="background:#E8C54733;color:#8C5E0A;border-color:#E8C547" onclick="setNewPrio('medium')">🟡 中优先</button>
            <button class="prio-btn" id="pf-low" style="background:#6BCB7733;color:#2E7D32" onclick="setNewPrio('low')">🟢 低优先</button>
          </div>
        </div>
        <div class="card" style="padding:18px;margin-bottom:20px;display:flex;gap:10px;align-items:center">
          <input type="text" id="todo-input" placeholder="添加新任务，按回车确认..." style="flex:1" onkeydown="if(event.key==='Enter')addTodo()">
          <input type="text" id="todo-due" placeholder="截止 MM-DD" style="width:110px">
          <button class="btn btn-primary btn-sm" onclick="addTodo()">＋ 添加</button>
        </div>
        <div id="todo-list"></div>
      </div>

      <!-- 小鼠管理 -->
      <div id="tab-mice" class="hidden">
        <div class="section-head">
          <div><div class="section-title">小鼠管理</div><div class="section-sub" id="mice-sub">加载中...</div></div>
          <button class="btn btn-primary btn-sm" onclick="openModal('add-mice-modal')">＋ 添加笼位</button>
        </div>
        <div class="summary-grid" id="mice-summary"></div>
        <div class="mice-table">
          <div class="mice-header">
            <div>笼子编号</div><div>品系</div><div>Mating Unit</div><div>实验笼</div><div>备注</div><div></div>
          </div>
          <div id="mice-rows"></div>
        </div>
      </div>

    </div>
  </div>
</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ===== 弹窗 ===== -->

<!-- 成员详情 -->
<div class="modal-overlay" id="member-detail-modal" onclick="closeModalOutside(event,'member-detail-modal')">
  <div class="modal-box">
    <div class="modal-head"><span class="modal-title">成员详情</span><button class="modal-close" onclick="closeModal('member-detail-modal')">✕</button></div>
    <div id="member-detail-content"></div>
  </div>
</div>

<!-- 添加成员 -->
<div class="modal-overlay" id="add-member-modal" onclick="closeModalOutside(event,'add-member-modal')">
  <div class="modal-box">
    <div class="modal-head"><span class="modal-title">添加新成员</span><button class="modal-close" onclick="closeModal('add-member-modal')">✕</button></div>
    <div class="form-group"><div class="input-label">姓名 *</div><input type="text" id="m-name" placeholder="张三"></div>
    <div class="form-group"><div class="input-label">职位</div><input type="text" id="m-role" placeholder="博士生 / 硕士生 / 博士后..."></div>
    <div class="form-group"><div class="input-label">邮箱</div><input type="text" id="m-email" placeholder="xxx@ocean.edu.cn"></div>
    <div class="form-group"><div class="input-label">电话</div><input type="text" id="m-phone" placeholder="138-xxxx-xxxx"></div>
    <div class="form-group"><div class="input-label">项目 / 职责（逗号分隔）</div><input type="text" id="m-projects" placeholder="NSFC项目, 小鼠建模..."></div>
    <div class="form-group"><div class="input-label">头像颜色</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px" id="color-picker">
        <div onclick="selectColor('#E8C547')" style="width:28px;height:28px;border-radius:50%;background:#E8C547;cursor:pointer;border:3px solid #1A1410"></div>
        <div onclick="selectColor('#FF7E5F')" style="width:28px;height:28px;border-radius:50%;background:#FF7E5F;cursor:pointer"></div>
        <div onclick="selectColor('#6BCB77')" style="width:28px;height:28px;border-radius:50%;background:#6BCB77;cursor:pointer"></div>
        <div onclick="selectColor('#4D96FF')" style="width:28px;height:28px;border-radius:50%;background:#4D96FF;cursor:pointer"></div>
        <div onclick="selectColor('#C77DFF')" style="width:28px;height:28px;border-radius:50%;background:#C77DFF;cursor:pointer"></div>
        <div onclick="selectColor('#FF6B6B')" style="width:28px;height:28px;border-radius:50%;background:#FF6B6B;cursor:pointer"></div>
      </div>
      <input type="hidden" id="m-color" value="#E8C547">
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px">
      <button class="btn btn-outline btn-sm" onclick="closeModal('add-member-modal')">取消</button>
      <button class="btn btn-primary btn-sm" onclick="addMember()">确认添加</button>
    </div>
  </div>
</div>

<!-- 入职清单 -->
<div class="modal-overlay" id="onboard-modal" onclick="closeModalOutside(event,'onboard-modal')">
  <div class="modal-box">
    <div class="modal-head"><span class="modal-title">新成员入职清单</span><button class="modal-close" onclick="closeModal('onboard-modal')">✕</button></div>
    <div id="onboard-list"></div>
    <div style="margin-top:12px;font-size:13px;color:#8C7B6B;text-align:center" id="onboard-progress"></div>
  </div>
</div>

<!-- 会议详情 -->
<div class="modal-overlay" id="meeting-detail-modal" onclick="closeModalOutside(event,'meeting-detail-modal')">
  <div class="modal-box">
    <div class="modal-head"><span class="modal-title" id="meeting-detail-title">会议详情</span><button class="modal-close" onclick="closeModal('meeting-detail-modal')">✕</button></div>
    <div id="meeting-detail-content"></div>
  </div>
</div>

<!-- 添加会议 -->
<div class="modal-overlay" id="add-meeting-modal" onclick="closeModalOutside(event,'add-meeting-modal')">
  <div class="modal-box">
    <div class="modal-head"><span class="modal-title">新增会议记录</span><button class="modal-close" onclick="closeModal('add-meeting-modal')">✕</button></div>
    <div class="form-group"><div class="input-label">日期</div><input type="date" id="mt-date"></div>
    <div class="form-group"><div class="input-label">会议名称 *</div><input type="text" id="mt-title" placeholder="周组会 #25"></div>
    <div class="form-group"><div class="input-label">出席人员（逗号分隔）</div><input type="text" id="mt-attendees" placeholder="张晓梅, 李浩然, ..."></div>
    <div class="form-group"><div class="input-label">会议纪要</div><textarea id="mt-notes" placeholder="讨论内容..." rows="4"></textarea></div>
    <div class="form-group"><div class="input-label">行动项</div><input type="text" id="mt-action" placeholder="xxx：某日前完成某事"></div>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px">
      <button class="btn btn-outline btn-sm" onclick="closeModal('add-meeting-modal')">取消</button>
      <button class="btn btn-primary btn-sm" onclick="addMeeting()">保存记录</button>
    </div>
  </div>
</div>

<!-- 添加小鼠 -->
<div class="modal-overlay" id="add-mice-modal" onclick="closeModalOutside(event,'add-mice-modal')">
  <div class="modal-box">
    <div class="modal-head"><span class="modal-title">添加笼位</span><button class="modal-close" onclick="closeModal('add-mice-modal')">✕</button></div>
    <div class="form-group"><div class="input-label">笼子编号 *</div><input type="text" id="mc-cage" placeholder="A-001"></div>
    <div class="form-group"><div class="input-label">品系 (Strain)</div><input type="text" id="mc-strain" placeholder="C57BL/6J"></div>
    <div class="form-group"><div class="input-label">Mating Unit</div><input type="text" id="mc-mu" placeholder="MU-01"></div>
    <div class="form-group"><div class="input-label">实验占用笼数</div><input type="number" id="mc-exp" placeholder="2" min="0"></div>
    <div class="form-group"><div class="input-label">备注</div><input type="text" id="mc-notes" placeholder="实验说明..."></div>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px">
      <button class="btn btn-outline btn-sm" onclick="closeModal('add-mice-modal')">取消</button>
      <button class="btn btn-primary btn-sm" onclick="addMouse()">确认添加</button>
    </div>
  </div>
</div>

<script>
// ── 配置 ──────────────────────────────────────────────────────────────────────
// 如果后端和前端在同一台服务器，留空即可（使用相对路径）
const API = '';

// ── 工具 ──────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const COLORS = { people:'#E8C547', meeting:'#FF7E5F', todo:'#6BCB77', mice:'#4D96FF' };
const STRAIN_COLORS = { 'C57BL/6J':'#4D96FF','BALB/c':'#FF7E5F','NOD/SCID':'#C77DFF','FVB/N':'#6BCB77' };
const BUBBLE_COLORS = ['#E8C547','#FF7E5F','#6BCB77','#4D96FF','#C77DFF'];
let newPrio = 'medium';
let selectedMeetingId = null;

function showToast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── 日期 ─────────────────────────────────────────────────────────────────────
$('today-date').textContent = new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});

// ── Tab 切换 ──────────────────────────────────────────────────────────────────
function switchTab(name) {
  ['people','meeting','todo','mice'].forEach(t => {
    $('tab-'+t).classList.toggle('hidden', t!==name);
    $('nav-'+t).classList.toggle('active', t===name);
  });
  if (name==='people') loadMembers();
  if (name==='meeting') loadMeetings();
  if (name==='todo') loadTodos();
  if (name==='mice') loadMice();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id) { $(id).classList.add('open'); }
function closeModal(id) { $(id).classList.remove('open'); }
function closeModalOutside(e, id) { if (e.target.id===id) closeModal(id); }

// ── 颜色选择 ──────────────────────────────────────────────────────────────────
function selectColor(c) {
  $('m-color').value = c;
  document.querySelectorAll('#color-picker div').forEach(d => {
    d.style.border = d.style.background===c ? '3px solid #1A1410' : '3px solid transparent';
  });
}

// ═══════════════════════════════════════════════════════════
// 人员管理
// ═══════════════════════════════════════════════════════════
async function loadMembers() {
  const members = await api('/api/members');
  $('member-sub').textContent = members.length + ' 位成员';
  const grid = $('member-grid');
  grid.innerHTML = members.map(m => `
    <div class="card member-card" onclick="showMember(${m.id})">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
        <div class="avatar-circle" style="background:${m.color}">${m.avatar}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;color:#1A1410;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.name}</div>
          <div style="font-size:12px;color:#8C7B6B;margin-top:2px">${m.role||''}</div>
        </div>
        <button class="del-btn" onclick="event.stopPropagation();deleteMember(${m.id})">🗑</button>
      </div>

        ${(m.projects||[]).map(p=>`<span class="tag">${p}</span>`).join('')}

}

      <div class="info-row"><span>📞</span><div><div style="font-size:11px;color:#8C7B6B">电话</div><div style="font-size:14px;color:#1A1410">${m.phone||'—'}</div></div></div>

  });

async function deleteMember(id) {

async function loadOnboarding() {
  const items = await api('/api/onboarding');
  const done = items.filter(i=>i.done).length;
  $('onboard-list').innerHTML = items.map(i => `
    <div class="check-item ${i.done?'done-check':''}" onclick="toggleOnboard(${i.id},${i.done?0:1})">
      <div class="check-box">${i.done?'✓':''}</div>
      <span style="font-size:14px;color:${i.done?'#3D8B47':'#1A1410'};text-decoration:${i.done?'line-through':'none'}">${i.task}</span>

  `).join('');

}

$('nav-people').addEventListener('click', () => {});

async function loadMeetings() {
  const meetings = await api('/api/meetings');
  $('meeting-sub').textContent = '共 ' + meetings.length + ' 条记录';
  $('meeting-list').innerHTML = meetings.map(m => `
    <div class="card meeting-card" onclick="showMeeting(${m.id})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div>
          <div style="font-weight:700;font-size:16px;color:#1A1410">${m.title}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:4px;color:#8C7B6B;font-size:13px">
            📅 ${m.date||'未填日期'}
          </div>
        </div>
        <div style="display:flex">
          ${(m.attendees||[]).slice(0,4).map((a,i)=>`
            <div style="width:28px;height:28px;border-radius:50%;background:${BUBBLE_COLORS[i%5]};display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;margin-left:${i>0?'-6px':'0'};border:2px solid #fff">${a[0]}</div>
          `).join('')}
          ${m.attendees.length>4?`<div style="width:28px;height:28px;border-radius:50%;background:#D9CFBF;display:flex;align-items:center;justify-content:center;font-size:10px;color:#5C4D3C;margin-left:-6px;border:2px solid #fff">+${m.attendees.length-4}</div>`:''}
        </div>
      </div>
      <p style="color:#5C4D3C;font-size:14px;line-height:1.6;margin:0 0 12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${m.notes||'无纪要'}</p>
      ${m.action?`<div style="background:#FFF8E6;border-radius:10px;padding:8px 14px;font-size:13px;color:#8C5E0A">⚡ ${m.action}</div>`:''}
    </div>
  `).join('') || '<div style="text-align:center;color:#8C7B6B;padding:40px">暂无会议记录</div>';
}

// ═══════════════════════════════════════════════════════════
// To-Do
// ═══════════════════════════════════════════════════════════
const PRIO_COLOR = {high:'#FF7E5F',medium:'#E8C547',low:'#6BCB77'};
const PRIO_LABEL = {high:'🔴 紧急',medium:'🟡 中',low:'🟢 低'};

function setNewPrio(p) {
  newPrio = p;
  ['high','medium','low'].forEach(x => {
    $('pf-'+x).style.borderColor = x===p ? '#1A1410' : 'transparent';
    $('pf-'+x).style.fontWeight = x===p ? '700' : '600';
  });
}
setNewPrio('medium');

async function loadTodos() {
  const todos = await api('/api/todos');
  const pending = todos.filter(t=>!t.done);
  const done = todos.filter(t=>t.done);
  $('todo-sub').textContent = `${pending.length} 项待办 · ${done.length} 项已完成`;

  const renderItem = t => `
    <div class="todo-item ${t.done?'todo-done':''}">
      <div class="todo-check" onclick="toggleTodo(${t.id},${t.done?0:1})">${t.done?'✓':''}</div>
      <div style="flex:1">
        <div style="font-size:14px;color:${t.done?'#8C7B6B':'#1A1410'};font-weight:500;text-decoration:${t.done?'line-through':'none'}">${t.text}</div>
        ${t.due?`<div style="font-size:12px;color:#8C7B6B;margin-top:2px">截止 ${t.due}</div>`:''}
      </div>
      <span style="background:${PRIO_COLOR[t.priority]||'#E8C547'}33;color:${PRIO_COLOR[t.priority]||'#E8C547'};border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;flex-shrink:0">${PRIO_LABEL[t.priority]||''}</span>
      <button class="del-btn" onclick="deleteTodo(${t.id})">🗑</button>
    </div>
  `;

  $('todo-list').innerHTML =
    (pending.length ? pending.map(renderItem).join('') : '<div style="text-align:center;color:#8C7B6B;padding:20px">暂无待办 🎉</div>') +
    (done.length ? `<div style="margin:12px 0 8px;font-size:12px;font-weight:600;color:#8C7B6B;letter-spacing:.05em">已完成</div>${done.map(renderItem).join('')}` : '');
}

async function addTodo() {
  const text = $('todo-input').value.trim();
  if (!text) return;
  await api('/api/todos','POST',{ text, priority:newPrio, due:$('todo-due').value });
  $('todo-input').value = ''; $('todo-due').value = '';
  showToast('✅ 已添加');
  loadTodos();
}

async function toggleTodo(id, done) {
  await api('/api/todos/'+id,'PATCH',{done:!!done});
  loadTodos();
}

async function deleteTodo(id) {
  await api('/api/todos/'+id,'DELETE');
  showToast('已删除');
  loadTodos();
}

// ═══════════════════════════════════════════════════════════
// 小鼠管理
// ═══════════════════════════════════════════════════════════
async function loadMice() {
  const mice = await api('/api/mice');
  const total = mice.reduce((s,m)=>s+m.exp_cages,0);
  $('mice-sub').textContent = `${mice.length} 个笼位 · 共 ${total} 笼实验用鼠`;

  // 品系汇总
  const strains = {};
  mice.forEach(m => { strains[m.strain] = (strains[m.strain]||0) + m.exp_cages; });
  $('mice-summary').innerHTML = Object.entries(strains).map(([s,c]) => `
    <div class="summary-card">
      <div style="font-size:28px;margin-bottom:8px">🐭</div>
      <div style="font-weight:700;font-size:22px;color:#1A1410">${c}</div>
      <div style="font-size:11px;color:#8C7B6B;margin-top:2px">${s}</div>
    </div>
  `).join('');

  $('mice-rows').innerHTML = mice.map(m => {
    const color = STRAIN_COLORS[m.strain] || '#8C7B6B';
    const dots = Array.from({length:Math.min(m.exp_cages,6)}).map(()=>`<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#E8C547;margin-right:2px"></span>`).join('');
    return `
      <div class="mice-row">
        <div style="font-weight:700;color:#1A1410;font-family:'DM Mono',monospace;font-size:14px">${m.cage_no}</div>
        <div><span style="background:${color}22;color:${color};border-radius:8px;padding:3px 10px;font-size:12px;font-weight:600">${m.strain||'—'}</span></div>
        <div style="color:#5C4D3C;font-size:13px">${m.mating_unit||'—'}</div>
        <div>${dots}${m.exp_cages>6?`<span style="font-size:11px;color:#8C7B6B">+${m.exp_cages-6}</span>`:''}</div>
        <div style="color:#8C7B6B;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.notes||''}</div>
        <button class="del-btn" onclick="deleteMouse(${m.id})">🗑</button>
      </div>
    `;
  }).join('') || '<div style="text-align:center;color:#8C7B6B;padding:40px">暂无数据</div>';
}

async function addMouse() {
  const cage_no = $('mc-cage').value.trim();
  if (!cage_no) { showToast('请填写笼子编号'); return; }
  await api('/api/mice','POST',{
    cage_no, strain:$('mc-strain').value,
    mating_unit:$('mc-mu').value,
    exp_cages:parseInt($('mc-exp').value)||0,
    notes:$('mc-notes').value
  });
  closeModal('add-mice-modal');
  ['mc-cage','mc-strain','mc-mu','mc-exp','mc-notes'].forEach(id=>$(id).value='');
  showToast('✅ 笼位已添加');
  loadMice();
}

async function deleteMouse(id) {
  if (!confirm('确认删除该笼位？')) return;
  await api('/api/mice/'+id,'DELETE');
  showToast('已删除');
  loadMice();
}
